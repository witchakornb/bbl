<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knight's Tour Visualizer</title>

    <!-- Vue 3 Runtime -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
    </style>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      /* Hide scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-200 overflow-hidden">
    <!-- Main App Mount Point -->
    <div id="app"></div>

    <script>
      const { createApp, ref, computed, watch, onMounted, onUnmounted } = Vue;

      // --- KNIGHT TOUR ALGORITHM LOGIC ---
      function calculateKnightTour(boardSize, startX, startY) {
        const n = boardSize;
        if (n % 2 === 0) return [];

        const board = Array.from({ length: n }, () => new Array(n).fill(0));
        const directions = [
          [-2, -1],
          [-2, 1],
          [-1, -2],
          [-1, 2],
          [1, -2],
          [1, 2],
          [2, -1],
          [2, 1],
        ];
        const targetCenterStep = Math.floor((n * n + 1) / 2);
        const centerPos = Math.floor(n / 2);

        function isValid(r, c) {
          return r >= 0 && r < n && c >= 0 && c < n && board[r][c] === 0;
        }

        function countOnwardMoves(r, c) {
          let count = 0;
          for (const [dr, dc] of directions) {
            if (isValid(r + dr, c + dc)) count++;
          }
          return count;
        }

        const path = [];

        function solve(r, c, step) {
          board[r][c] = step;
          path.push({ x: c, y: r });

          if (
            step === targetCenterStep &&
            (r !== centerPos || c !== centerPos)
          ) {
            board[r][c] = 0;
            path.pop();
            return false;
          }
          if (r === centerPos && c === centerPos && step !== targetCenterStep) {
            board[r][c] = 0;
            path.pop();
            return false;
          }
          if (step === n * n) return true;

          const moves = [];
          for (const [dr, dc] of directions) {
            const nr = r + dr,
              nc = c + dc;
            if (isValid(nr, nc)) {
              moves.push([countOnwardMoves(nr, nc), nr, nc]);
            }
          }
          // Warnsdorff's heuristic: choose moves with fewer onward moves
          moves.sort((a, b) => a[0] - b[0]);

          for (const [, nr, nc] of moves) {
            if (solve(nr, nc, step + 1)) return true;
          }

          board[r][c] = 0;
          path.pop();
          return false;
        }

        const success = solve(startY, startX, 1);
        return success ? path : [];
      }

      // --- VUE APP COMPONENT ---
      const App = {
        template: `
        <div class="flex flex-col lg:flex-row h-screen w-screen overflow-hidden bg-slate-950 text-slate-200 font-sans">
          <!-- Sidebar -->
          <aside class="w-full lg:w-80 bg-slate-900 border-b lg:border-b-0 lg:border-r border-slate-800 p-6 flex flex-col gap-6 z-20 shrink-0 overflow-y-auto">
             <div class="mb-4">
               <a href="index.html" class="inline-flex items-center gap-1.5 text-xs font-semibold text-slate-400 hover:text-sky-400 transition-colors mb-4 uppercase tracking-wider">
                 <i data-lucide="arrow-left" class="w-4 h-4"></i>
                 Back to Homepage
               </a>
               <h1 class="text-xl font-bold text-white mb-1">Knight's Tour</h1>
               <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Starts at Top-Left (0, 0)</p>
             </div>

             <!-- Control Panel -->
             <div class="flex flex-col gap-6 w-full h-full">
                 <div class="flex p-1 bg-slate-800 rounded-lg mb-2">
                   <button @click="mode = 'auto'" :class="['flex-1 py-1.5 text-xs font-bold uppercase rounded-[4px] transition-colors', mode === 'auto' ? 'bg-sky-500 text-white' : 'text-slate-400 hover:text-slate-200']">Auto Solve</button>
                   <button @click="mode = 'interactive'" :class="['flex-1 py-1.5 text-xs font-bold uppercase rounded-[4px] transition-colors', mode === 'interactive' ? 'bg-amber-500 text-white' : 'text-slate-400 hover:text-slate-200']">Interactive</button>
                 </div>

                 <div class="space-y-4">
                   <div>
                     <label class="text-xs font-bold text-slate-500 uppercase">Board Size (N)</label>
                     <div class="flex gap-2 mt-2">
                         <button 
                            v-for="s in allowedSizes" 
                            :key="s"
                            @click="onSizeChange(s)"
                            :class="['flex-1 py-2 text-sm transition-colors', s === boardSize ? (mode === 'interactive' ? 'bg-amber-600 border-amber-400 shadow-amber-900/20' : 'bg-sky-600 border-sky-400 shadow-sky-900/20') + ' rounded border font-bold shadow-lg text-white' : 'bg-slate-800 rounded border border-slate-700 hover:border-slate-500 text-slate-200']"
                         >
                            {{ s }}
                         </button>
                     </div>
                   </div>

                   <div v-if="mode === 'auto'" class="pt-4 border-t border-slate-800">
                     <label class="text-xs font-bold text-slate-500 uppercase">Playback Speed</label>
                     <input 
                        type="range" 
                        min="1" 
                        max="10" 
                        v-model.number="speed"
                        class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer mt-4"
                        :class="mode === 'auto' ? 'accent-sky-500' : 'accent-amber-500'" 
                     />
                   </div>
                 </div>

                 <!-- The Playback control bar -->
                 <div v-if="mode === 'auto'" class="mt-6 flex items-center justify-center gap-4 bg-slate-900/80 backdrop-blur-md px-6 py-4 rounded-full border border-slate-800 shadow-2xl mx-auto w-fit">
                     <button @click="prevStep" :disabled="progress <= 0" class="p-2 text-slate-400 hover:text-white transition disabled:opacity-40 disabled:hover:text-slate-400">
                        <i data-lucide="skip-back" class="w-6 h-6"></i>
                     </button>
                     <button @click="playPause" class="w-14 h-14 bg-sky-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-sky-500/40 hover:scale-105 active:scale-95 transition-transform">
                        <i v-if="isPlaying" data-lucide="pause" class="w-8 h-8 fill-current"></i>
                        <i v-else data-lucide="play" class="w-8 h-8 fill-current opacity-90 translate-x-[2px]"></i>
                     </button>
                     <button @click="nextStep" :disabled="!(path.length > 0 && progress < path.length - 1)" class="p-2 text-slate-400 hover:text-white transition disabled:opacity-40 disabled:hover:text-slate-400">
                        <i data-lucide="skip-forward" class="w-6 h-6"></i>
                     </button>
                 </div>

                 <!-- Interactive Control Info -->
                 <div v-if="mode === 'interactive'" class="mt-6 bg-amber-500/5 border border-amber-500/20 p-4 rounded-xl text-center text-amber-200 text-sm shadow-[inset_0_0_15px_rgba(245,158,11,0.05)]">
                    <p>You control the knight.</p>
                    <p class="text-[11px] text-amber-400/60 mt-1">Click valid highlighted squares to move. Avoid dead ends!</p>
                 </div>
             </div>

             <!-- Warning Toast -->
             <transition enter-active-class="transition duration-300 ease-out" enter-from-class="opacity-0 translate-y-4 scale-95" enter-to-class="opacity-100 translate-y-0 scale-100" leave-active-class="transition duration-200 ease-in" leave-from-class="opacity-100 translate-y-0 scale-100" leave-to-class="opacity-0 translate-y-2 scale-95">
               <div v-if="warningMsg" class="p-4 bg-rose-500/10 border border-rose-500/20 rounded-lg shrink-0 mt-4">
                 <h3 class="text-rose-400 text-xs font-bold flex items-center gap-2 mb-1">
                   <i data-lucide="alert-triangle" class="w-3 h-3"></i>
                   SYSTEM WARNING
                 </h3>
                 <p class="text-[11px] text-rose-300/80">{{ warningMsg }}</p>
               </div>
             </transition>

             <!-- Progress track -->
             <div class="mt-auto pt-4 flex flex-col gap-2">
                <div class="bg-slate-800/50 p-4 rounded border border-slate-700/50">
                   <div class="flex justify-between text-xs mb-2">
                      <span class="text-slate-400">Current Step</span>
                      <span class="text-sky-400 font-mono">{{ Math.max(Math.floor(progress), 0) }} / {{ Math.max(path.length - 1, 0) }}</span>
                   </div>
                   <div class="w-full bg-slate-900 h-1 rounded overflow-hidden">
                      <div class="bg-sky-500 h-full transition-all duration-300" :style="{ width: path.length ? \`\${(progress / (path.length - 1)) * 100}%\` : '0%' }"></div>
                   </div>
                </div>
             </div>
          </aside>

          <!-- Main View -->
          <main class="flex-1 flex flex-col items-center justify-center relative bg-[radial-gradient(circle_at_center,_#1e293b_0%,_#020617_100%)] p-4 lg:p-8 overflow-hidden z-10 w-full min-h-[500px]">
              <div class="absolute top-4 left-4 lg:top-8 lg:left-8 text-slate-500 text-xs sm:text-sm flex flex-col sm:flex-row gap-4 sm:gap-6 z-10">
                  <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-sm bg-sky-500"></span> Knight Path</div>
                  <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-sm border border-amber-400 bg-amber-400/20"></span> Trap (Center)</div>
              </div>
              <div class="w-full max-w-[540px]">
                 <!-- Chess Grid -->
                 <div class="relative w-full aspect-square overflow-hidden shadow-2xl border-4 border-slate-800 bg-slate-900 mx-auto" style="max-width: 540px;">
                    <canvas
                       ref="canvasRef"
                       width="800"
                       height="800"
                       :class="['w-full h-full', mode === 'interactive' ? 'cursor-pointer' : '']"
                       @click="onCanvasClick"
                    ></canvas>
                 </div>
              </div>
          </main>
        </div>
      `,
        setup() {
          const allowedSizes = [7, 9, 11, 13, 15];
          const boardSize = ref(7);
          const startX = ref(0);
          const startY = ref(0);
          const path = ref([]);

          const mode = ref("auto");
          const progress = ref(0);
          const isPlaying = ref(false);
          const speed = ref(5);
          const warningMsg = ref("");

          const canvasRef = ref(null);

          let animationFrameId = null;
          let lastTime = 0;

          // Compute possible valid moves for interactive mode
          const validMoves = computed(() => {
            if (mode.value !== "interactive") return [];
            if (path.value.length === 0) return [];
            const last = path.value[path.value.length - 1];
            const moves = [
              [1, 2],
              [2, 1],
              [-1, 2],
              [-2, 1],
              [1, -2],
              [2, -1],
              [-1, -2],
              [-2, -1],
            ];
            const center = Math.floor(boardSize.value / 2);
            const targetCenterStep = Math.floor(
              (boardSize.value * boardSize.value + 1) / 2,
            );

            return moves
              .map(([dx, dy]) => ({ x: last.x + dx, y: last.y + dy }))
              .filter(
                (p) =>
                  p.x >= 0 &&
                  p.x < boardSize.value &&
                  p.y >= 0 &&
                  p.y < boardSize.value,
              )
              .filter(
                (p) => !path.value.some((v) => v.x === p.x && v.y === p.y),
              )
              .filter((p) => {
                // Must hit center purely exactly at the proper step
                if (
                  p.x === center &&
                  p.y === center &&
                  path.value.length + 1 !== targetCenterStep
                )
                  return false;
                return true;
              });
          });

          const showWarning = (msg) => {
            warningMsg.value = msg;
            setTimeout(() => (warningMsg.value = ""), 4000);
          };

          const generateTour = (size) => {
            isPlaying.value = false;
            progress.value = 0;
            startX.value = 0;
            startY.value = 0;

            // Generate actual algorithm path
            const solvedPath = calculateKnightTour(size, 0, 0);

            if (solvedPath.length === 0) {
              showWarning(
                `No valid tour found starting at top-left for size ${size}.`,
              );
              path.value = [];
              return;
            }

            path.value = solvedPath;
          };

          const startInteractive = (size) => {
            isPlaying.value = false;
            path.value = [{ x: 0, y: 0 }];
            progress.value = 0;
            startX.value = 0;
            startY.value = 0;
          };

          watch(mode, (newMode) => {
            if (newMode === "auto") {
              generateTour(boardSize.value);
            } else {
              startInteractive(boardSize.value);
            }
          });

          const onSizeChange = (newSize) => {
            boardSize.value = newSize;
            if (mode.value === "auto") {
              setTimeout(() => generateTour(newSize), 10);
            } else {
              startInteractive(newSize);
            }
          };

          const onSquareClick = (x, y) => {
            if (mode.value !== "interactive") return;
            const isPossible = validMoves.value.some(
              (m) => m.x === x && m.y === y,
            );

            if (!isPossible) {
              showWarning(
                "Invalid move! Can only select highlighted 'L' shape moves.",
              );
              return;
            }

            path.value.push({ x, y });
            // In interactive, progress auto-snaps to path.length in loop.
          };

          const onCanvasClick = (e) => {
            if (mode.value !== "interactive") return;
            if (!canvasRef.value) return;

            const rect = canvasRef.value.getBoundingClientRect();
            const scaleX = canvasRef.value.width / rect.width;
            const scaleY = canvasRef.value.height / rect.height;

            const px = (e.clientX - rect.left) * scaleX;
            const py = (e.clientY - rect.top) * scaleY;

            const sq = canvasRef.value.width / boardSize.value;
            const x = Math.floor(px / sq);
            const y = Math.floor(py / sq);

            if (
              x >= 0 &&
              x < boardSize.value &&
              y >= 0 &&
              y < boardSize.value
            ) {
              onSquareClick(x, y);
            }
          };

          const playPause = () => {
            if (path.value.length === 0) {
              showWarning("No valid path available to play.");
              return;
            }
            if (progress.value >= path.value.length - 1 && !isPlaying.value) {
              progress.value = 0;
            }
            isPlaying.value = !isPlaying.value;
          };

          const nextStep = () => {
            isPlaying.value = false;
            if (path.value.length === 0) return;
            if (progress.value < path.value.length - 1) {
              progress.value = Math.min(
                Math.floor(progress.value) + 1,
                path.value.length - 1,
              );
            }
          };

          const prevStep = () => {
            isPlaying.value = false;
            if (path.value.length === 0) return;
            if (progress.value > 0) {
              progress.value = Math.max(Math.ceil(progress.value) - 1, 0);
            }
          };

          const draw = () => {
            if (!canvasRef.value) return;
            const canvas = canvasRef.value;
            const ctx = canvas.getContext("2d");
            if (!ctx) return;

            const w = canvas.width;
            const h = canvas.height;
            const N = boardSize.value;
            const sq = w / N;
            const cx = Math.floor(N / 2);
            const cy = Math.floor(N / 2);

            ctx.clearRect(0, 0, w, h);

            // 1. Draw Checkerboard Grid
            for (let i = 0; i < N; i++) {
              for (let j = 0; j < N; j++) {
                ctx.fillStyle = (i + j) % 2 === 0 ? "#334155" : "#1e293b"; // slate-700 / slate-800
                ctx.fillRect(i * sq, j * sq, sq, sq);

                // Draw Trap square
                if (i === cx && j === cy) {
                  ctx.fillStyle = "rgba(251, 191, 36, 0.15)";
                  ctx.fillRect(i * sq, j * sq, sq, sq);
                  ctx.strokeStyle = "#fbbf24";
                  ctx.lineWidth = 3;
                  ctx.strokeRect(i * sq + 1.5, j * sq + 1.5, sq - 3, sq - 3);
                }
                // Draw valid interactive moves highlight
                else if (
                  mode.value === "interactive" &&
                  validMoves.value.some((m) => m.x === i && m.y === j)
                ) {
                  ctx.fillStyle = "rgba(245, 158, 11, 0.15)"; // amber-500
                  ctx.fillRect(i * sq, j * sq, sq, sq);
                  ctx.strokeStyle = "#fbbf24";
                  ctx.lineWidth = 2;
                  ctx.strokeRect(i * sq + 2, j * sq + 2, sq - 4, sq - 4);
                }
              }
            }

            // 2. Draw Start Position Highlight (if empty)
            if (
              startX.value !== null &&
              startY.value !== null &&
              path.value.length === 0
            ) {
              ctx.fillStyle = "rgba(56, 189, 248, 0.3)"; // sky-400 at 30%
              ctx.fillRect(startX.value * sq, startY.value * sq, sq, sq);
              ctx.strokeStyle = "#0ea5e9"; // sky-500
              ctx.lineWidth = 4;
              ctx.strokeRect(
                startX.value * sq + 2,
                startY.value * sq + 2,
                sq - 4,
                sq - 4,
              );
            }

            // 3. Draw Path Line (L-Shape), Badges & Knight
            if (path.value.length > 0 && progress.value >= 0) {
              const getPt = (p) => ({
                x: p.x * sq + sq / 2,
                y: p.y * sq + sq / 2,
              });

              const maxIdx = Math.floor(progress.value);
              let knightPt = getPt(path.value[maxIdx]);

              // Draw L-Shape interpolation if animating between squares
              if (maxIdx < path.value.length - 1 && progress.value > maxIdx) {
                ctx.beginPath();
                ctx.strokeStyle = "#38bdf8"; // sky-400
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowColor = "#0ea5e9"; // sky-500
                ctx.shadowBlur = 8;

                const p1 = path.value[maxIdx];
                const p2 = path.value[maxIdx + 1];
                const f = progress.value - maxIdx;

                const dx = p2.x - p1.x;
                let corner = { x: 0, y: 0 };

                // L-shape pivot corner
                if (Math.abs(dx) === 2) {
                  corner = { x: p2.x, y: p1.y };
                } else {
                  corner = { x: p1.x, y: p2.y };
                }

                const pt1 = getPt(p1);
                const pt2 = getPt(p2);
                const ptCorner = getPt(corner);

                if (f <= 2 / 3) {
                  // Traveling the long side of the L
                  const localF = f / (2 / 3);
                  knightPt.x = pt1.x + (ptCorner.x - pt1.x) * localF;
                  knightPt.y = pt1.y + (ptCorner.y - pt1.y) * localF;
                  ctx.moveTo(pt1.x, pt1.y);
                  ctx.lineTo(knightPt.x, knightPt.y);
                } else {
                  // Traveling the short side of the L
                  const localF = (f - 2 / 3) / (1 / 3);
                  knightPt.x = ptCorner.x + (pt2.x - ptCorner.x) * localF;
                  knightPt.y = ptCorner.y + (pt2.y - ptCorner.y) * localF;
                  ctx.moveTo(pt1.x, pt1.y);
                  ctx.lineTo(ptCorner.x, ptCorner.y);
                  ctx.lineTo(knightPt.x, knightPt.y);
                }

                ctx.stroke();
                ctx.shadowBlur = 0; // turn off shadow
              }

              // Loop to draw visited step number badges
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.font = `bold ${Math.max(12, sq * 0.28)}px Inter, sans-serif`;

              for (let i = 0; i <= maxIdx; i++) {
                const pt = getPt(path.value[i]);

                ctx.beginPath();
                ctx.fillStyle = "#0f172a"; // slate-900 background badge
                ctx.arc(pt.x, pt.y, Math.max(10, sq * 0.22), 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#f8fafc"; // slate-50 text
                if (i === 0) ctx.fillStyle = "#34d399"; // Emerald Start
                if (
                  i === path.value.length - 1 &&
                  progress.value >= path.value.length - 1 - 0.01
                )
                  ctx.fillStyle = "#fbbf24"; // Amber End

                ctx.fillText((i + 1).toString(), pt.x, pt.y + 1);
              }

              // Draw Knight piece
              ctx.fillStyle =
                mode.value === "interactive" ? "#fbbf24" : "#38bdf8";
              ctx.shadowColor =
                mode.value === "interactive" ? "#f59e0b" : "#0ea5e9";
              ctx.shadowBlur = 12;
              ctx.font = `${Math.max(20, sq * 0.6)}px sans-serif`;
              ctx.fillText("♞", knightPt.x, knightPt.y + sq * 0.05);
              ctx.shadowBlur = 0;
            }
          };

          // Deep watch state to trigger redraw immediately
          watch(
            [boardSize, startX, startY, path, progress, mode, validMoves],
            () => draw(),
            { deep: true },
          );

          const loop = (time) => {
            if (!lastTime) lastTime = time;
            const deltaTime = time - lastTime;
            lastTime = time;

            if (path.value.length > 0) {
              if (mode.value === "auto" && isPlaying.value) {
                const squaresPerMs = speed.value * speed.value * 0.0001;
                let newProgress = progress.value + squaresPerMs * deltaTime;

                if (newProgress >= path.value.length - 1) {
                  newProgress = path.value.length - 1;
                  isPlaying.value = false;
                }
                progress.value = newProgress;
              } else if (
                mode.value === "interactive" &&
                progress.value < path.value.length - 1
              ) {
                // Smooth snap to target on manual interaction
                const catchupSpeed = 0.008;
                let newProgress = progress.value + catchupSpeed * deltaTime;
                if (newProgress >= path.value.length - 1) {
                  newProgress = path.value.length - 1;
                }
                progress.value = newProgress;
              }
            }

            draw();
            animationFrameId = requestAnimationFrame(loop);
          };

          onMounted(() => {
            animationFrameId = requestAnimationFrame(loop);
            generateTour(boardSize.value);

            // Re-render lucide icons occasionally or initially
            setTimeout(() => lucide?.createIcons(), 100);
          });

          onUnmounted(() => {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
          });

          return {
            allowedSizes,
            boardSize,
            path,
            mode,
            progress,
            isPlaying,
            speed,
            warningMsg,
            canvasRef,
            onSizeChange,
            playPause,
            nextStep,
            prevStep,
            onCanvasClick,
          };
        },
      };

      const app = createApp(App);
      app.mount("#app");

      // Periodically update icons if new ones appear
      setInterval(() => lucide?.createIcons(), 500);
    </script>
  </body>
</html>
